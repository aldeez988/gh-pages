<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Percentage Calculator</title>
</head>

<body>
    <div class="container">
        <h1>Percentage Calculator</h1>
        <form action="" id="percent--form">
            <div class="form__control">
                <label for="amount">Amount</label>
                <input type="number" name="amount" id="amount" min="0" required>
            </div>
            <div class="form__control">
                <label for="percent">Percent</label>
                <input type="number" name="percent" id="percent" min="0" required>
            </div>
            <div class="form__control">
                <label for="result">Result</label>
                <input type="number" name="result" id="result"disabled>
            </div>
            <div class="form__control">
                <input class="form__btn" type="submit" name="submit" id="submit">
            </div>
        </form>
    </div>
</body>

</html>
